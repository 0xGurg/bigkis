# Example bigkis system declaration.
#
# Default search paths (in order):
#   1. --config <path>
#   2. $BIGKIS_CONFIG
#   3. /etc/bigkis/system.toml
#   4. $XDG_CONFIG_HOME/bigkis/system.toml
#   5. ~/.config/bigkis/system.toml

[settings]
# Plugins to run, in order. Removing a plugin from this list disables it.
enabled = ["pacman", "aur", "flatpak", "node"]

# AUR helper to wrap. One of: "yay", "paru".
aur_helper = "yay"

# Default node global package manager. One of: "npm", "pnpm", "yarn".
node_manager = "pnpm"

# Native Arch repository packages.
#
# This is your explicit pacman baseline: the native packages you want bigkis to
# keep installed on this machine. Include system essentials, kernel, firmware,
# networking, build tools, shell/editor/tools, and desktop packages/apps if
# they come from the official repos.
#
# To bootstrap from an existing Arch install:
#
#   pacman -Qqen > pacman-packages.txt
#
# Then curate the generated list into this section. Do not blindly copy every
# package forever; remove experiments and keep only the baseline you want to
# reproduce.
[pacman]
packages = [
  # Boot / base system
  "base",
  "linux",
  "linux-firmware",

  # Network / access
  "networkmanager",
  "openssh",
  "ufw",

  # Package and build tools
  "git",
  "base-devel",
  "go",

  # Shell / editor / CLI tools
  "neovim",
  "fish",
  "ripgrep",
  "fd",
  "fzf",

  # Desktop and native apps can live here too if they come from pacman.
  # Examples:
  # "gnome",
  # "plasma",
  # "sway",
  # "firefox",
  # "alacritty",
]

# bigkis will never install or remove ignored packages. Useful for manually
# managed replacements (e.g. opendoas), vendor packages, temporary experiments,
# or anything you want visible in config but not controlled yet.
ignored = []

[aur]
# Foreign packages from the AUR. To inspect your current foreign explicit
# packages on an existing Arch install:
#
#   pacman -Qqem > aur-packages.txt
#
# Then curate the result into this list.
packages = [
  # After bootstrap, let bigkis manage itself declaratively through AUR.
  "bigkis-bin",
  "fnm-bin",
  "visual-studio-code-bin",
]

# Don't let bigkis touch the AUR helper itself.
ignored = ["yay"]

[flatpak]
# System-wide flatpaks (installed with --system from flathub).
packages = [
  "org.mozilla.firefox",
  "org.signal.Signal",
]
ignored = []

# Per-user flatpaks (installed with --user as that user).
[flatpak.user_packages]
# Replace "georgep" with your actual username.
georgep = ["com.valvesoftware.Steam"]

[node]
# Global packages installed with the default manager from [settings].
packages = [
  "typescript",
  "eslint",
]

# Per-package overrides. The package's manager takes precedence over
# settings.node_manager.
[[node.package]]
name = "@vue/cli"
manager = "yarn"

[[node.package]]
name = "create-react-app"
manager = "npm"
