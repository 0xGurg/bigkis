name: release

# Releases are cut by pushing an annotated version tag (e.g. v0.7.6). This
# workflow builds static linux/amd64 and linux/arm64 binaries, checksums them,
# optionally minisigns checksums.txt, and publishes GitHub release assets.
#
# Release notes are written directly on the GitHub releases page when you
# create a tag. There is no CHANGELOG.md — the release body is the source of
# truth for what changed.
#
# Optional secret for automatic AUR updates after a successful tag-based
# release publish:
# - AUR_SSH_PRIVATE_KEY: private SSH key for an AUR account with push access
#   to ssh://aur@aur.archlinux.org/bigkis-bin.git

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_MINISIGN: ${{ secrets.MINISIGN_PRIVATE_KEY != '' }}
      HAS_AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY != '' }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: prepare dist directory
        run: mkdir -p dist

      - name: build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/bigkis-linux-amd64 ./cmd/bigkis

      - name: build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/bigkis-linux-arm64 ./cmd/bigkis

      - name: checksums
        working-directory: dist
        run: sha256sum bigkis-linux-amd64 bigkis-linux-arm64 > checksums.txt

      # Sign checksums.txt with minisign when a signing secret is configured.
      # Set repo secrets MINISIGN_PRIVATE_KEY (the contents of the .key file)
      # and MINISIGN_PASSWORD. Skipped silently when MINISIGN_PRIVATE_KEY is
      # not set so installs without signing keep working.
      - name: install minisign
        if: env.HAS_MINISIGN == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y minisign

      - name: sign checksums.txt
        if: env.HAS_MINISIGN == 'true'
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          VERSION: ${{ github.ref_name }}
        working-directory: dist
        run: |
          umask 077
          printf '%s\n' "$MINISIGN_PRIVATE_KEY" > minisign.key
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S \
            -s minisign.key \
            -m checksums.txt \
            -t "bigkis ${VERSION}"
          rm -f minisign.key

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: wait for release asset availability
        if: env.HAS_AUR_KEY == 'true'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          url="https://github.com/0xGurg/bigkis/releases/download/${VERSION}/bigkis-linux-amd64"
          i=0
          until curl -IfsSL "$url" >/dev/null 2>&1; do
            i=$((i + 1))
            if [ "$i" -ge 30 ]; then
              echo "release asset not reachable after publish: $url"
              exit 1
            fi
            sleep 10
          done

      - name: setup AUR SSH credentials
        if: env.HAS_AUR_KEY == 'true'
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -eu
          umask 077
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_aur"
          chmod 600 "$HOME/.ssh/id_aur"
          ssh-keyscan aur.archlinux.org >> "$HOME/.ssh/known_hosts"

      - name: update bigkis-bin AUR package
        if: env.HAS_AUR_KEY == 'true'
        env:
          VERSION: ${{ github.ref_name }}
          GIT_AUTHOR_NAME: bigkis-release-bot
          GIT_AUTHOR_EMAIL: bigkis-release-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: bigkis-release-bot
          GIT_COMMITTER_EMAIL: bigkis-release-bot@users.noreply.github.com
        run: |
          set -eu
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          aur_dir="$(mktemp -d)"
          trap 'rm -rf "$aur_dir"' EXIT INT TERM
          git clone ssh://aur@aur.archlinux.org/bigkis-bin.git "$aur_dir"
          ./scripts/update-aur-bigkis-bin.sh "$VERSION" "$aur_dir"
          cd "$aur_dir"
          if [ -z "$(git status --porcelain -- PKGBUILD .SRCINFO .gitignore LICENSE)" ]; then
            echo "AUR package already up to date"
            exit 0
          fi
          git add PKGBUILD .SRCINFO .gitignore LICENSE
          git commit -m "update bigkis-bin to ${VERSION}"
          git push origin master
