name: release

# Releases are cut by pushing an annotated version tag (e.g. v0.5.1). This
# workflow builds static linux/amd64 and linux/arm64 binaries, checksums them,
# optionally minisigns checksums.txt, and publishes Codeberg release assets.
#
# Required secret: GITHUB_TOKEN is auto-provided by Forgejo Actions and has
# enough scope on the current repo to create releases. If your instance
# does not auto-provide it, create a personal access token with
# `write:repository` and add it as a secret named GITHUB_TOKEN (or change
# the `token:` value below to point at a different secret name).
#
# Optional secret for automatic AUR updates after a successful tag-based
# release publish:
# - AUR_SSH_PRIVATE_KEY: private SSH key for an AUR account with push access
#   to ssh://aur@aur.archlinux.org/bigkis-bin.git
#
# We update AUR only on tag-triggered runs (not the main-push bootstrap run)
# so the changelog-driven path does not race itself when it creates a tag and
# that tag immediately triggers a second workflow run.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: codeberg-small
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: prepare dist directory
        run: mkdir -p dist

      - name: build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/bigkis-linux-amd64 ./cmd/bigkis

      - name: build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o dist/bigkis-linux-arm64 ./cmd/bigkis

      - name: checksums
        working-directory: dist
        run: sha256sum bigkis-linux-amd64 bigkis-linux-arm64 > checksums.txt

      # Extract the section of CHANGELOG.md matching this tag and upload
      # it as a release asset. Keeping the notes as an asset avoids
      # forgejo-release@v2's fragile release-notes input path while still
      # putting the changelog on the Codeberg release instead of the wiki.
      - name: extract release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          tag="${VERSION}"
          file="dist/release-notes.md"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$tag" '
              BEGIN { found = 0 }
              $0 ~ "^## "tag"([[:space:]]|$)" { found = 1; next }
              /^## v[0-9]/ && found { exit }
              found { print }
            ' CHANGELOG.md > "$file"
          fi
          if [ ! -s "$file" ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "$tag" > "$file"
          fi
          echo "--- release notes for $tag ---"
          cat "$file"

      # Sign checksums.txt with minisign when a signing secret is configured.
      # Set repo secrets MINISIGN_PRIVATE_KEY (the contents of the .key file)
      # and MINISIGN_PASSWORD. Skipped silently when MINISIGN_PRIVATE_KEY is
      # not set so installs without signing keep working.
      - name: install minisign
        if: secrets.MINISIGN_PRIVATE_KEY != ''
        run: |
          sudo apt-get update -y
          sudo apt-get install -y minisign

      - name: sign checksums.txt
        if: secrets.MINISIGN_PRIVATE_KEY != ''
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          VERSION: ${{ github.ref_name }}
        working-directory: dist
        run: |
          umask 077
          printf '%s\n' "$MINISIGN_PRIVATE_KEY" > minisign.key
          # -W skips the password prompt when MINISIGN_PASSWORD is set in env.
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S \
            -s minisign.key \
            -m checksums.txt \
            -t "bigkis ${VERSION}"
          rm -f minisign.key

      - name: publish release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          url: https://codeberg.org
          repo: ${{ github.repository }}
          direction: upload
          release-dir: dist
          tag: ${{ github.ref_name }}
          title: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          override: true

      # Patch the release body via the Codeberg API. forgejo-release@v2's
      # release-notes input feeds multi-line markdown through a quoted
      # heredoc inside the action and is fragile (v0.4.1 and v0.5.0 both
      # shipped with empty bodies under that path). The API accepts the
      # body as a JSON string, which is robust against any markdown.
      - name: set release body from changelog
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          release_id=$(curl -fsSL \
            -H "Authorization: token $TOKEN" \
            "https://codeberg.org/api/v1/repos/$REPO/releases/tags/$VERSION" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          payload=$(python3 -c 'import json; print(json.dumps({"body": open("dist/release-notes.md").read()}))')
          curl -fsSL -X PATCH \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://codeberg.org/api/v1/repos/$REPO/releases/$release_id" \
            > /dev/null
          echo "release body for $VERSION updated"

      - name: wait for release asset availability
        if: secrets.AUR_SSH_PRIVATE_KEY != ''
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          url="https://codeberg.org/gurg/bigkis/releases/download/${VERSION}/bigkis-linux-amd64"
          i=0
          until curl -IfsSL "$url" >/dev/null 2>&1; do
            i=$((i + 1))
            if [ "$i" -ge 30 ]; then
              echo "release asset not reachable after publish: $url"
              exit 1
            fi
            sleep 10
          done

      - name: setup AUR SSH credentials
        if: secrets.AUR_SSH_PRIVATE_KEY != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -eu
          umask 077
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_aur"
          chmod 600 "$HOME/.ssh/id_aur"
          ssh-keyscan aur.archlinux.org >> "$HOME/.ssh/known_hosts"

      - name: update bigkis-bin AUR package
        if: secrets.AUR_SSH_PRIVATE_KEY != ''
        env:
          VERSION: ${{ github.ref_name }}
          GIT_AUTHOR_NAME: bigkis-release-bot
          GIT_AUTHOR_EMAIL: bigkis-release-bot@users.noreply.codeberg.org
          GIT_COMMITTER_NAME: bigkis-release-bot
          GIT_COMMITTER_EMAIL: bigkis-release-bot@users.noreply.codeberg.org
        run: |
          set -eu
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          aur_dir="$(mktemp -d)"
          trap 'rm -rf "$aur_dir"' EXIT INT TERM
          git clone ssh://aur@aur.archlinux.org/bigkis-bin.git "$aur_dir"
          ./scripts/update-aur-bigkis-bin.sh "$VERSION" "$aur_dir"
          cd "$aur_dir"
          if [ -z "$(git status --porcelain -- PKGBUILD .SRCINFO .gitignore LICENSE)" ]; then
            echo "AUR package already up to date"
            exit 0
          fi
          git add PKGBUILD .SRCINFO .gitignore LICENSE
          git commit -m "update bigkis-bin to ${VERSION}"
          git push origin master
