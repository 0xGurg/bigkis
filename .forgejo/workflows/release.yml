name: release

# Triggers when a tag like v0.1.0 is pushed. Builds static linux/amd64 and
# linux/arm64 binaries, generates checksums.txt, and publishes them as
# Codeberg release assets. install.sh is what consumes this layout.
#
# Required secret: GITHUB_TOKEN is auto-provided by Forgejo Actions and has
# enough scope on the current repo to create releases. If your instance
# does not auto-provide it, create a personal access token with
# `write:repository` and add it as a secret named GITHUB_TOKEN (or change
# the `token:` value below to point at a different secret name).

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: codeberg-small
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: prepare dist directory
        run: mkdir -p dist

      - name: build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/bigkis-linux-amd64 ./cmd/bigkis

      - name: build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/bigkis-linux-arm64 ./cmd/bigkis

      - name: checksums
        working-directory: dist
        run: sha256sum bigkis-linux-amd64 bigkis-linux-arm64 > checksums.txt

      # Extract the section of CHANGELOG.md matching this tag and write it to
      # a file. We do not feed this into forgejo-release@v2's release-notes
      # input — multi-line values trip up that action's quoted-heredoc
      # substitution. Instead the "set release body" step below patches the
      # body via the Codeberg API after publish, which is robust against any
      # markdown content.
      - name: extract release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          file="release-notes.md"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$tag" '
              BEGIN { found = 0 }
              # Match "## v0.4.1" or "## v0.4.1 - ..." but not "## v0.4.10".
              $0 ~ "^## "tag"([[:space:]]|$)" { found = 1; next }
              /^## v[0-9]/ && found { exit }
              found { print }
            ' CHANGELOG.md > "$file"
          fi
          if [ ! -s "$file" ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "$tag" > "$file"
          fi
          echo "--- release notes for $tag ---"
          cat "$file"

      # Sign checksums.txt with minisign when a signing secret is configured.
      # Set repo secrets MINISIGN_PRIVATE_KEY (the contents of the .key file)
      # and MINISIGN_PASSWORD. Skipped silently when MINISIGN_PRIVATE_KEY is
      # not set so installs without signing keep working.
      - name: install minisign
        if: ${{ secrets.MINISIGN_PRIVATE_KEY != '' }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y minisign

      - name: sign checksums.txt
        if: ${{ secrets.MINISIGN_PRIVATE_KEY != '' }}
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        working-directory: dist
        run: |
          umask 077
          printf '%s\n' "$MINISIGN_PRIVATE_KEY" > minisign.key
          # -W skips the password prompt when MINISIGN_PASSWORD is set in env.
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S \
            -s minisign.key \
            -m checksums.txt \
            -t "bigkis ${GITHUB_REF_NAME}"
          rm -f minisign.key

      - name: publish release
        uses: https://code.forgejo.org/actions/forgejo-release@v2
        with:
          url: https://codeberg.org
          repo: ${{ github.repository }}
          direction: upload
          release-dir: dist
          tag: ${{ github.ref_name }}
          title: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          override: true

      # Patch the release body via the Codeberg API. The action's own
      # release-notes input feeds the value through a quoted heredoc inside
      # its bash and is fragile for multi-paragraph markdown; the API
      # accepts arbitrary content as a JSON string, which is much safer.
      #
      # All python invocations here are one-liners on purpose: a multi-line
      # `python3 -c` inside a YAML `run: |` block easily breaks the literal
      # scalar's indentation, which causes Forgejo Actions to silently fail
      # to register the workflow at all.
      - name: set release body from changelog
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          release_id=$(curl -fsSL -H "Authorization: token $TOKEN" "https://codeberg.org/api/v1/repos/$REPO/releases/tags/$TAG" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')
          payload=$(python3 -c 'import json; print(json.dumps({"body": open("release-notes.md").read()}))')
          curl -fsSL -X PATCH -H "Authorization: token $TOKEN" -H "Content-Type: application/json" -d "$payload" "https://codeberg.org/api/v1/repos/$REPO/releases/$release_id" > /dev/null
          echo "release body for $TAG updated"
