name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: codeberg-tiny
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...
