name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: codeberg-medium
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: vet
        run: go vet ./...

      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "files need gofmt:"
            gofmt -l .
            exit 1
          fi

      - name: test
        run: go test -race -timeout 10m ./...

  staticcheck:
    runs-on: codeberg-medium
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...
