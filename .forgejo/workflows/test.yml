name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Isolating CI failure: stripped to bare minimum steps.
  # Previous runs on codeberg-small and codeberg-medium both failed.
  # All checks (go vet, gofmt, go test -race, staticcheck) pass locally.
  test:
    runs-on: codeberg-medium
    steps:
      - name: checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: setup go
        uses: https://code.forgejo.org/actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: test
        run: go test -count=1 -timeout 10m ./...
