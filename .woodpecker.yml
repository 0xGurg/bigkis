# Codeberg / Woodpecker CI for bigkis.
#
# Triggers:
#   - push to main: build + test only.
#   - push of a tag: build static linux/amd64 and linux/arm64 binaries,
#     generate checksums.txt, and publish them as a Codeberg release so
#     install.sh can fetch them.
#
# Required secrets in Codeberg:
#   - codeberg_token: a Codeberg access token with package:write or
#     equivalent permissions for creating releases.

when:
  - event: [push, pull_request, tag]

steps:
  test:
    image: golang:1.26
    commands:
      - go vet ./...
      - go test ./...

  build-amd64:
    image: golang:1.26
    when:
      - event: tag
    environment:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
    commands:
      - go build -trimpath -ldflags "-s -w -X main.version=${CI_COMMIT_TAG}" -o bigkis-linux-amd64 ./cmd/bigkis

  build-arm64:
    image: golang:1.26
    when:
      - event: tag
    environment:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: arm64
    commands:
      - go build -trimpath -ldflags "-s -w -X main.version=${CI_COMMIT_TAG}" -o bigkis-linux-arm64 ./cmd/bigkis

  checksums:
    image: alpine:3
    when:
      - event: tag
    commands:
      - apk add --no-cache coreutils
      - sha256sum bigkis-linux-amd64 bigkis-linux-arm64 > checksums.txt
      - cat checksums.txt

  release:
    image: woodpeckerci/plugin-gitea-release
    when:
      - event: tag
    settings:
      base_url: https://codeberg.org
      api_key:
        from_secret: codeberg_token
      title: ${CI_COMMIT_TAG}
      files:
        - bigkis-linux-amd64
        - bigkis-linux-arm64
        - checksums.txt
